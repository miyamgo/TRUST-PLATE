<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Vendor | TRUST-PLATE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f4c3a, #16a085);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 0;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            transition: max-width 0.4s ease;
        }

        .auth-card.register-mode {
            max-width: 700px;
        }

        .auth-brand {
            color: #0f4c3a;
            font-weight: 900;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-control, .form-select {
            border-radius: 10px; padding: 12px; font-size: 0.9rem;
            background-color: #f8f9fa; border: 1px solid #e9ecef;
        }

        .form-control:focus, .form-select:focus {
            border-color: #16a085; box-shadow: none; background-color: white;
        }

        .btn-auth {
            background-color: #0f4c3a; color: white; border-radius: 10px;
            padding: 12px; font-weight: bold; width: 100%; border: none; transition: 0.3s;
        }
        .btn-auth:hover { background-color: #0a3528; }

        /* Multi-step indicator */
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .step-indicator::before { content: ''; position: absolute; top: 15px; left: 0; width: 100%; height: 2px; background: #e9ecef; z-index: 1; }
        .step { width: 32px; height: 32px; border-radius: 50%; background: #e9ecef; color: #6c757d; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 2; position: relative; border: 4px solid white; transition: 0.3s; }
        .step.active { background: #16a085; color: white; }
        .step.completed { background: #0f4c3a; color: white; }

        /* Form sections */
        .form-section { display: none; animation: fadeIn 0.4s; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* File Input Styling */
        .file-upload-wrapper { position: relative; border: 2px dashed #ced4da; border-radius: 10px; padding: 15px; text-align: center; background-color: #f8f9fa; cursor: pointer; transition: 0.3s; }
        .file-upload-wrapper:hover { border-color: #16a085; background-color: #e8f6f3; }
        .file-upload-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center">
        <div class="auth-card" id="mainCard">

            <div class="auth-brand">
                <i class="fas fa-shield-alt text-success me-2"></i>TRUST-PLATE<br>
                <span class="fs-6 text-muted fw-normal">Portal Kemitraan Dapur Umum</span>
            </div>

            <div id="loginSection" class="form-section active">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Nomor Induk Berusaha (NIB) / ID Vendor</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-id-card text-muted"></i></span>
                            <input type="text" class="form-control" id="loginNib" placeholder="Contoh: 812904812001" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <label class="form-label small fw-bold text-muted mb-0">Kata Sandi</label>
                        </div>
                        <div class="input-group mt-2">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control" id="loginPassword" placeholder="********" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-auth shadow-sm mb-3" id="btnLogin">
                        <i class="fas fa-sign-in-alt me-2"></i> Masuk ke Portal
                    </button>

                    <button type="button" class="btn btn-outline-success w-100 py-2 fw-bold" onclick="showRegister()">
                        <i class="fas fa-building me-2"></i> Daftar Mitra Baru
                    </button>

                    <div class="text-center mt-4 pt-3 border-top small text-muted">
                        Kembali ke <a href="index.html" class="text-success text-decoration-none fw-bold">Halaman Publik</a>
                    </div>
                </form>
            </div>

            <div id="registerSection" class="form-section">

                <div class="step-indicator px-4">
                    <div class="step active" id="step1-indicator">1</div>
                    <div class="step" id="step2-indicator">2</div>
                    <div class="step" id="step3-indicator">3</div>
                </div>
                <h5 class="fw-bold text-center text-dark mb-4" id="stepTitle">Profil Badan Usaha</h5>

                <form id="regForm">
                    <div id="step1" class="step-content">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Nama Badan Usaha / Mitra <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="regNamaUsaha" placeholder="Contoh: PT. Dapur Nusantara" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Nomor Induk Berusaha (NIB) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="regNib" placeholder="13 Digit NIB" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-muted">Alamat Lengkap Utama Mitra <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="regAlamat" placeholder="Jalan, RT/RW, Kel, Kec..." required>
                            </div>
                            
                            <div class="col-md-12 border-bottom pb-1 mt-3">
                                <label class="form-label small fw-bold text-dark"><i class="fas fa-map-marker-alt text-danger me-1"></i> Koordinat Dapur (Geofencing)</label>
                            </div>
                            <div class="col-md-8">
                                <div class="input-group">
                                    <input type="text" class="form-control bg-light" id="regLat" placeholder="Latitude" readonly required>
                                    <input type="text" class="form-control bg-light" id="regLng" placeholder="Longitude" readonly required>
                                </div>
                                <small class="text-muted" style="font-size: 0.7rem;">Wajib dilacak untuk kalkulasi jarak distribusi.</small>
                            </div>
                            <div class="col-md-4">
                                <button type="button" class="btn btn-outline-danger w-100 fw-bold" onclick="getLocation()"><i class="fas fa-satellite-dish me-1"></i> Lacak GPS</button>
                            </div>

                            <div class="col-md-6 mt-3">
                                <label class="form-label small fw-bold text-muted">Email Perusahaan <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" id="regEmail" placeholder="kontak@perusahaan.com" required>
                            </div>
                            <div class="col-md-6 mt-3">
                                <label class="form-label small fw-bold text-muted">No. WhatsApp <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="regNoHp" placeholder="0812xxxxxx" required>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" class="btn btn-outline-secondary px-4 fw-bold" onclick="cancelRegister()">Batal</button>
                            <button type="button" class="btn btn-success px-5 fw-bold" onclick="nextStep(2)">Lanjut <i class="fas fa-arrow-right ms-2"></i></button>
                        </div>
                    </div>

                    <div id="step2" class="step-content" style="display: none;">
                        <div class="alert bg-warning bg-opacity-10 border border-warning text-dark small py-2 mb-3">
                            <i class="fas fa-info-circle me-1 text-warning"></i> Unggah dokumen pendukung dalam format PDF atau JPG/PNG (Maks 5MB per file).
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Akta Badan Usaha</label>
                                <div class="file-upload-wrapper">
                                    <input type="file" accept=".pdf,.jpg,.png">
                                    <i class="fas fa-file-pdf text-danger fs-3 mb-1"></i><div class="small fw-bold mt-1 text-dark">Pilih File</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">SK Pengesahan</label>
                                <div class="file-upload-wrapper">
                                    <input type="file" accept=".pdf,.jpg,.png">
                                    <i class="fas fa-file-pdf text-danger fs-3 mb-1"></i><div class="small fw-bold mt-1 text-dark">Pilih File</div>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" class="btn btn-outline-secondary px-4 fw-bold" onclick="prevStep(1)"><i class="fas fa-arrow-left me-2"></i> Kembali</button>
                            <button type="button" class="btn btn-success px-5 fw-bold" onclick="nextStep(3)">Lanjut <i class="fas fa-arrow-right ms-2"></i></button>
                        </div>
                    </div>

                    <div id="step3" class="step-content" style="display: none;">
                        <div class="row g-3 mb-4">
                            <div class="col-12 border-bottom pb-2 mb-2">
                                <h6 class="fw-bold text-dark mb-0"><i class="fas fa-user-tie me-2"></i>Data Penanggung Jawab</h6>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-muted">Nama Lengkap Sesuai KTP <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="regNamaPj" placeholder="Nama Penanggung Jawab" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-muted">NIK KTP <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="regNikPj" placeholder="16 Digit NIK" required>
                            </div>
                            
                            <div class="col-12 border-bottom pb-2 mb-2 mt-4">
                                <h6 class="fw-bold text-dark mb-0"><i class="fas fa-lock me-2"></i>Keamanan Akun Portal</h6>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Buat Kata Sandi <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" id="regPassword" placeholder="Minimal 6 karakter" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Ulangi Kata Sandi <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" id="regPasswordConfirm" placeholder="Ketik ulang sandi" required>
                            </div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="flexCheckDefault" required>
                            <label class="form-check-label small text-muted" for="flexCheckDefault">
                                Saya menjamin bahwa seluruh data adalah asli.
                            </label>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" class="btn btn-outline-secondary px-4 fw-bold" onclick="prevStep(2)"><i class="fas fa-arrow-left me-2"></i> Kembali</button>
                            <button type="submit" class="btn btn-primary px-4 fw-bold shadow" id="btnRegister"><i class="fas fa-paper-plane me-2"></i> Kirim Pendaftaran</button>
                        </div>
                    </div>

                </form>
            </div>

        </div>
    </div>

    <script>
        // LOGIKA WIZARD & TAMPILAN
        function showRegister() {
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('mainCard').classList.add('register-mode');
            setTimeout(() => { document.getElementById('registerSection').classList.add('active'); }, 300);
            
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'none';
            updateStepIndicators(1);
        }

        function cancelRegister() {
            document.getElementById('registerSection').classList.remove('active');
            document.getElementById('mainCard').classList.remove('register-mode');
            setTimeout(() => { document.getElementById('loginSection').classList.add('active'); }, 300);
        }

        const stepTitles = ["Profil Badan Usaha", "Unggah Dokumen Legalitas", "Data Penanggung Jawab"];

        function nextStep(step) {
            // Validasi Step 1: Pastikan Koordinat Terisi
            if(step === 2) {
                const nama = document.getElementById('regNamaUsaha').value;
                const nib = document.getElementById('regNib').value;
                const lat = document.getElementById('regLat').value;
                
                if(!nama || !nib) return Swal.fire('Data Tidak Lengkap', 'Harap isi Nama Usaha dan NIB.', 'warning');
                if(!lat) return Swal.fire('Lokasi Kosong', 'Harap klik tombol "Lacak GPS" terlebih dahulu.', 'warning');
            }
            
            document.querySelectorAll('.step-content').forEach(el => el.style.display = 'none');
            document.getElementById('step' + step).style.display = 'block';
            updateStepIndicators(step);
            document.getElementById('stepTitle').innerText = stepTitles[step - 1];
        }

        function prevStep(step) {
            document.querySelectorAll('.step-content').forEach(el => el.style.display = 'none');
            document.getElementById('step' + step).style.display = 'block';
            updateStepIndicators(step);
            document.getElementById('stepTitle').innerText = stepTitles[step - 1];
        }

        function updateStepIndicators(currentStep) {
            for (let i = 1; i <= 3; i++) {
                let indicator = document.getElementById('step' + i + '-indicator');
                if (i < currentStep) {
                    indicator.className = 'step completed'; indicator.innerHTML = '<i class="fas fa-check"></i>';
                } else if (i === currentStep) {
                    indicator.className = 'step active'; indicator.innerHTML = i;
                } else {
                    indicator.className = 'step'; indicator.innerHTML = i;
                }
            }
        }

        // FUNGSI GEOTAGGING (MENGAMBIL LOKASI BROWSER)
        function getLocation() {
            if (navigator.geolocation) {
                Swal.fire({title: 'Memindai Satelit...', html: 'Mencari lokasi dapur Anda', allowOutsideClick: false, didOpen: () => {Swal.showLoading()}});
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        document.getElementById('regLat').value = position.coords.latitude.toFixed(6);
                        document.getElementById('regLng').value = position.coords.longitude.toFixed(6);
                        Swal.close();
                        Swal.fire({icon: 'success', title: 'Terlacak', text: 'Koordinat dapur berhasil dikunci.', timer: 1500, showConfirmButton: false});
                    }, 
                    (error) => {
                        // Jika di-block, berikan koordinat default (Bandung) agar demo jalan
                        document.getElementById('regLat').value = '-6.914744';
                        document.getElementById('regLng').value = '107.609810';
                        Swal.fire('Informasi', 'Akses lokasi browser dimatikan. Menggunakan koordinat default kota.', 'info');
                    }
                );
            } else {
                Swal.fire('Error', 'Browser tidak mendukung pelacakan lokasi.', 'error');
            }
        }

        // 1. FUNGSI LOGIN
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const originalText = btn.innerHTML;
            
            const nib = document.getElementById('loginNib').value;
            const password = document.getElementById('loginPassword').value;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Memverifikasi...';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:3000/api/vendor/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nib, password })
                });
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('vendor_data', JSON.stringify(result.data));
                    window.location.href = 'vendor-dashboard.html';
                } else {
                    Swal.fire('Akses Ditolak', result.message, 'error');
                }
            } catch (err) {
                Swal.fire('Koneksi Gagal', 'Server tidak merespon.', 'error');
            } finally {
                btn.innerHTML = originalText; btn.disabled = false;
            }
        });

        // 2. FUNGSI REGISTRASI BARU (TAMBAH LAT & LNG)
        document.getElementById('regForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regPasswordConfirm').value;
            if(password !== confirm) { return Swal.fire('Kesalahan', 'Kata Sandi tidak cocok!', 'error'); }

            const btn = document.getElementById('btnRegister');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Mengirim Data...';
            btn.disabled = true;

            // Masukkan data LAT dan LNG ke payload JSON
            const payload = {
                nama_usaha: document.getElementById('regNamaUsaha').value,
                nib: document.getElementById('regNib').value,
                npwp: document.getElementById('regNpwp').value || '0',
                alamat: document.getElementById('regAlamat').value,
                email: document.getElementById('regEmail').value,
                no_hp: document.getElementById('regNoHp').value,
                penanggung_jawab: document.getElementById('regNamaPj').value,
                nik_pj: document.getElementById('regNikPj').value,
                password: password,
                lat: document.getElementById('regLat').value,
                lng: document.getElementById('regLng').value
            };

            try {
                const response = await fetch('http://localhost:3000/api/vendor/register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {
                    Swal.fire({
                        title: 'Pendaftaran Terkirim!',
                        text: 'Akun berstatus "Menunggu Verifikasi" dan belum dapat digunakan hingga disetujui Pemerintah.',
                        icon: 'success', confirmButtonColor: '#0f4c3a'
                    }).then(() => {
                        cancelRegister(); document.getElementById('regForm').reset();
                    });
                } else {
                    Swal.fire('Pendaftaran Gagal', result.message, 'error');
                }
            } catch (err) {
                Swal.fire('Koneksi Gagal', 'Server tidak merespon.', 'error');
            } finally {
                btn.innerHTML = originalText; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
